name: kb-reverse-check (军规 4 LLM 反向校验)

# 默认只 manual 触发 (workflow_dispatch). 每跑一次 ~$0.10 OpenAI 成本 · 不挂 PR
# 自动跑避免每个 KB 微改都烧钱. 想 PR 自动跑时, 取消下方 pull_request 块的注释即可.
# 目的: 监控 reverse-check pass-rate 不退化.
on:
  workflow_dispatch:
    inputs:
      min_pass_rate:
        description: "Minimum pass rate (e.g. 0.80 = 80%)"
        required: false
        default: "0.80"
  # pull_request:
  #   paths:
  #     - "plugins/perf-kp-sql/data/knowledge.sqlite"
  #     - "plugins/perf-kp-sql/data/**/rules.json"
  #     - "plugins/perf-kp-sql/tools/kb-audit.mjs"
  #     - "plugins/perf-kp-sql/src/engines/**/*.ts"
  #     - ".github/workflows/kb-reverse-check.yml"

jobs:
  kb-reverse-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # 没设 OPENAI_API_KEY secret 时跳过 (avoid hard-failing 缺 key 的 fork PR)
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install runtime deps
        working-directory: plugins/perf-kp-sql
        run: npm install --no-save better-sqlite3 puppeteer-core openai

      - name: Verify Chromium
        run: which chromium-browser || sudo apt-get install -y chromium-browser

      # 复用 lint-kb-quotes 的 URL cache
      - name: Cache URL snapshots
        uses: actions/cache@v4
        with:
          path: plugins/perf-kp-sql/tools/url-cache
          key: url-cache-${{ hashFiles('plugins/perf-kp-sql/data/**/rules.json', 'plugins/perf-kp-sql/data/knowledge.sqlite') }}
          restore-keys: url-cache-

      - name: Refresh URL cache
        working-directory: plugins/perf-kp-sql
        run: node tools/refresh-url-cache.mjs

      - name: Run reverse-check (full KB)
        working-directory: plugins/perf-kp-sql
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::warning::OPENAI_API_KEY secret 未设 · 跳过 reverse-check (lint-kb-quotes 仍跑)"
            exit 0
          fi
          node tools/kb-audit.mjs --mode reverse-check --all --concurrency 10 \
            --cache tools/url-cache --out /tmp/rc.json

      - name: Enforce min pass rate
        env:
          MIN_PASS: ${{ github.event.inputs.min_pass_rate || '0.80' }}
        run: |
          if [ ! -f /tmp/rc.json ]; then echo "no report (skipped)"; exit 0; fi
          PASS=$(node -e "const r=require('/tmp/rc.json');console.log((r.summary.pass/r.summary.total).toFixed(4))")
          echo "pass rate: $PASS · threshold: $MIN_PASS"
          node -e "process.exit($PASS < $MIN_PASS ? 1 : 0)" \
            && echo "::notice::reverse-check pass rate $PASS ≥ threshold $MIN_PASS ✓" \
            || { echo "::error::reverse-check pass rate $PASS < threshold $MIN_PASS"; exit 1; }

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kb-reverse-check-report
          path: /tmp/rc.json
          retention-days: 30
