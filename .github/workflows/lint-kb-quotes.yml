name: lint-kb-quotes

# 默认只 manual 触发. KB 跨 i18n drift (本地 puppeteer 抓 zh-CN, CI runner 抓 en-US)
# 待修后再 enable PR/push 自动触发. 取消下方注释即可重启自动跑.
on:
  workflow_dispatch:
  # pull_request:
  #   paths:
  #     - "plugins/perf-kp-sql/data/**/rules.json"
  #     - "plugins/perf-kp-sql/data/knowledge.sqlite"
  #     - "plugins/perf-kp-sql/tools/lint-kb-quotes.mjs"
  #     - "plugins/perf-kp-sql/tools/refresh-url-cache.mjs"
  #     - "plugins/perf-kp-sql/tools/lint-kb-quotes.baseline.json"
  #     - ".github/workflows/lint-kb-quotes.yml"
  # push:
  #   branches: [main]
  #   paths:
  #     - "plugins/perf-kp-sql/data/**/rules.json"
  #     - "plugins/perf-kp-sql/data/knowledge.sqlite"

jobs:
  lint-kb-quotes:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # better-sqlite3 + puppeteer-core (refresh-url-cache 需要)
      - name: Install runtime deps
        working-directory: plugins/perf-kp-sql
        run: |
          npm install --no-save better-sqlite3 puppeteer-core

      # Ubuntu runner 自带 chromium-browser; refresh-url-cache 会按候选路径自动找
      - name: Verify Chromium available
        run: which chromium-browser || which google-chrome || sudo apt-get install -y chromium-browser

      # Cache URL text snapshots between runs (key by rules.json + sqlite hash)
      - name: Cache URL snapshots
        id: url-cache
        uses: actions/cache@v4
        with:
          path: plugins/perf-kp-sql/tools/url-cache
          key: url-cache-${{ hashFiles('plugins/perf-kp-sql/data/**/rules.json', 'plugins/perf-kp-sql/data/knowledge.sqlite') }}
          restore-keys: |
            url-cache-

      - name: Refresh URL cache (for new/changed URLs)
        working-directory: plugins/perf-kp-sql
        run: node tools/refresh-url-cache.mjs

      - name: Lint KB quotes against URL cache
        working-directory: plugins/perf-kp-sql
        run: node tools/lint-kb-quotes.mjs --baseline tools/lint-kb-quotes.baseline.json
